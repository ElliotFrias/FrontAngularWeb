<div class="mb-3"></div>
<div class="container">
  <div class="card border-success">
    <div class="card border-success">
      <div class="card-header text-primary text-center">
        <h2 class="card-title">
          {{titulo}}
        </h2>
      </div>
      <div class="card-body text-primary">
        <form>
          <div class="mb-3">
            <label for="nombreProducto" class="form-label">Nombre del producto</label>
            <input
              type="text"
              id="nombreProducto"
              name="nombreProducto"
              placeholder="Nombre del producto"
              class="form-control"
              maxlength="50"
              [(ngModel)]="elProducto().nombreProducto"
              />
          </div>

          <div class="mb-3">
            <label for="descripcionProducto" class="form-label">Descripcion del producto</label>
            <input
              type="text"
              id="descripcionProducto"
              name="descripcionProducto"
              placeholder="Descripcion del producto"
              class="form-control"
              maxlength="100"
              [(ngModel)]="elProducto().descripcionProducto"
              />
          </div>
          
          <div class="mb-3">
            <label for="existencia" class="form-label">Existencia</label>
            <input
              type="number"
              id="existencia"
              name="existencia"
              placeholder="Existencia"
              class="form-control"
              [(ngModel)]="elProducto().existencia"
              />
          </div>
          
          <div class="mb-3">
            <label for="precioProducto" class="form-label">Precio</label>
            <input
              type="number"
              id="precioProducto"
              name="precioProducto"
              placeholder="Precio"
              class="form-control"
              [(ngModel)]="elProducto().precioProducto"
              />
          </div>

          <div class="mb-3">
            <label for="idCategoria" class="form-label">Categoría</label>
            <select
              id="idCategoria"
              name="idCategoria"
              class="form-select"
              [compareWith]="compararCategoria"
              [(ngModel)]="elProducto().idCategoria"
            >
              <option [ngValue]="undefined" disabled>Selecciona una categoría</option>
              @for (cat of lasCategorias(); track cat.idCategoria) {
                <option [ngValue]="cat">{{cat.nombreCategoria}}</option>
              }
            </select>
          </div>

          @if (elProducto().idProducto != 0){
          <div class="mb-3">
            <button type="button" (click)="actualizarProducto()" class="btn btn-outline-success form-control">Actualizar Producto</button>
          </div>
        } @else {
          <div class="mb-3">
            <button type="button" (click)="registrarProducto()" class="btn btn-outline-primary form-control">Registrar Producto</button>
          </div>

        }
        </form>
      </div>
    </div>
  </div>
</div>
